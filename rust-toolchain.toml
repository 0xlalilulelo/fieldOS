# Pinned to a specific nightly date for reproducibility. Nightly is
# required for `extern "x86-interrupt" fn` (the abi_x86_interrupt
# feature the x86_64 crate uses for IDT handler signatures), and is
# almost certain to be required for naked_functions and allocator_api
# tweaks as later M0 steps land. Bump the date when a fresh feature
# arrives or a known nightly regression bites.
[toolchain]
channel = "nightly-2026-04-01"
components = ["rustfmt", "clippy"]
targets = ["x86_64-unknown-none"]
