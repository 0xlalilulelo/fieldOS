name: ci

# CI is intentionally dormant between configurations.
# Phase B (chore: remove Field OS C kernel and HolyC tree) deleted the
# Makefile, ci/qemu-smoke.sh, and the cross-toolchain scripts that the
# previous jobs (build-iso / smoke / asm-test / loc-budget) consumed.
# CI re-arms in Phase C against ARSENAL_BOOT_OK on a Cargo + xtask
# build of the Rust kernel. Until then this workflow exits 0 so the
# branch shows green-by-design rather than red-by-neglect.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  placeholder:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "CI re-armed in Phase C against ARSENAL_BOOT_OK."
