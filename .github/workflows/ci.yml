name: ci

# Build the Arsenal kernel, assemble the bootable ISO via xtask, and
# assert ARSENAL_BOOT_OK on COM1 under headless QEMU TCG. Always TCG —
# GitHub-hosted runners lack /dev/kvm. The rust-toolchain.toml pin
# governs which rustc version installs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 xorriso build-essential

      - name: Install Rust target
        run: rustup target add x86_64-unknown-none

      - name: Clippy (kernel)
        run: cargo clippy -p arsenal-kernel --target x86_64-unknown-none --release -- -D warnings

      - name: Clippy (xtask)
        run: cargo clippy -p xtask --release -- -D warnings

      - name: Assemble ISO
        run: cargo xtask iso

      - name: Smoke test
        run: ci/qemu-smoke.sh arsenal.iso
