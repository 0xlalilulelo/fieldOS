# Linker flags for the bare-metal kernel target. xtask invokes
# `cargo build --target x86_64-unknown-none -p arsenal-kernel`; the
# host-side xtask crate builds for the native target and is unaffected.

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tarsenal-kernel/linker.ld",
    "-C", "code-model=kernel",
    "-C", "relocation-model=static",
    # getrandom on bare-metal: no system RNG exists. We register a
    # custom backend in arsenal-kernel/src/rand.rs; this cfg tells
    # getrandom to dispatch to our extern "Rust" fn rather than try
    # to bind to libc / vDSO / Windows BCrypt.
    "--cfg", "getrandom_backend=\"custom\"",
]

[alias]
xtask = "run --release --package xtask --"
